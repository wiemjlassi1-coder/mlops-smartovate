# .github/workflows/monitor-drift.yml — Drift monitoring + auto-retraining (MLOPS-14 / MLOPS-15)
# Runs on a schedule: regenerates simulated production data, checks it for
# drift via PSI (monitoring/check_drift.py), and automatically triggers a
# retraining job when drift crosses the threshold.
#
# NOTE: production data is currently simulated (monitoring/simulate_production_data.py),
# not live endpoint traffic — see check_drift.py's docstring for why. The
# drift *check* itself needs no Azure access (pure local computation); only
# the retrain trigger step needs Azure login, which hits the same
# AZURE_CREDENTIALS blocker documented for cd.yml. Until that secret is
# configured, trigger this workflow manually (workflow_dispatch) and run
# the retrain step's az command locally if that step fails on login.

name: Monitor drift and retrain

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC — adjust to actual traffic cadence
  workflow_dispatch:        # manual trigger for testing

jobs:
  check-drift:
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.drift.outputs.drift_detected }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas scikit-learn

      - name: Generate simulated production data
        run: python monitoring/simulate_production_data.py

      - name: Run drift check
        id: drift
        continue-on-error: true
        run: python monitoring/check_drift.py

  retrain:
    needs: check-drift
    if: needs.check-drift.outputs.drift_detected == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI extension
        run: az extension add --name ml --yes

      - name: Trigger retraining job
        run: |
          az ml job create --file job.yaml \
            --workspace-name mlops-workspace-smartovate \
            --resource-group wiemjlassi

      - name: Notify (placeholder)
        run: |
          echo "Drift detected — retraining job submitted."
          echo "Manual next step: review the new run's metrics before promoting"
          echo "it to champion (register + redeploy), same process as MLOPS-8/11."