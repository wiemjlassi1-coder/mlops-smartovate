# .github/workflows/ci.yml — CI Pipeline (US 3.1)
# Triggers on every Pull Request to main.
# Runs flake8 (linting) and pytest (unit tests).
# The PR is blocked if either step fails.
name: CI - lint and test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pytest scikit-learn pandas numpy mlflow
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Full style check - warnings only (does not fail the build)
          flake8 src/ tests/ --count --max-line-length=100 --statistics --exit-zero
      - name: Run unit tests with pytest
        run: |
          pytest tests/ -v --tb=short