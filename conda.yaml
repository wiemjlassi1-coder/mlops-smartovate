# conda.yaml — Pinned dependency versions for Azure ML training environment
# Fixes Bug 1: ensures training and inference use identical library versions.
# Referenced by job.yaml and the endpoint deployment YAML.

name: mlops-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.12
  - pip=23.3.1
  - pip:
    - azureml-core==1.54.0
    - azureml-mlflow==1.54.0
    - mlflow==2.9.2
    - scikit-learn==1.3.2
    - pandas==2.1.4
    - numpy==1.26.2
    - pytest==7.4.3
    - flake8==6.1.0
